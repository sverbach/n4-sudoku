<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Sudoku</title>
<meta name="description" content="Offline-first Sudoku. Generate & solve — easy to very hard. No account.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f5f0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sudoku">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Martian+Mono:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f5f0; --paper:#f5f5f0; --ink:#0a0a0a; --line:#cdccc4; --box:#0a0a0a;
    --peer:#e8e7e0; --faint:#8a8a82; --note:#8f8e86; --selbg:#0a0a0a; --selink:#f5f5f0;
    --conflictbg:rgba(229,52,31,0.12); --accent:#e5341f;
    --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --display:'Martian Mono', 'JetBrains Mono', monospace;
    --maxw:460px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body, #root { height:100%; }
  body {
    font-family:var(--mono); background:var(--ink); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overscroll-behavior:none;
  }
  button { font-family:inherit; color:inherit; background:none; border:none; cursor:pointer; }
  @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }

  .app { width:100%; min-height:100%; background:var(--bg); display:flex; flex-direction:column;
         max-width:var(--maxw); margin:0 auto; position:relative; overflow-x:hidden; overflow-y:auto; }
  .screen { min-height:100%; display:flex; flex-direction:column; flex:1; }

  /* ── HOME ───────────────────────────────────────── */
  .home { position:relative; padding:calc(env(safe-area-inset-top) + 40px) 22px calc(env(safe-area-inset-bottom) + 22px); }
  .theme-toggle { width:44px; height:44px; display:flex; align-items:center; justify-content:center;
                  color:var(--ink); flex:0 0 auto; }
  .theme-toggle:hover { color:var(--accent); }
  .theme-toggle svg { display:block; }
  .home-tt { position:absolute; top:calc(env(safe-area-inset-top) + 30px); right:12px; z-index:5; }
  .home-top { flex:0 0 auto; }
  .logo { font-family:var(--display); font-weight:800; font-size:clamp(40px,12.5vw,56px);
          line-height:0.9; letter-spacing:-1.5px; color:var(--ink); }
  .tag { font-size:11px; letter-spacing:3px; color:var(--faint); margin-top:16px; }
  .diff-grid { flex:1 1 auto; display:grid; grid-template-columns:1fr 1fr; gap:0;
               margin:24px 0 22px; border-top:2px solid var(--ink); border-left:2px solid var(--ink); }
  .diff-card { position:relative; display:flex; flex-direction:column; justify-content:flex-end;
               align-items:flex-start; min-height:120px; padding:16px;
               border-right:2px solid var(--ink); border-bottom:2px solid var(--ink);
               background:var(--paper); color:var(--ink); text-align:left; transition:background .12s,color .12s; }
  .diff-card:hover { background:var(--ink); color:var(--paper); }
  .diff-label { font-family:var(--display); font-weight:800; font-size:20px; letter-spacing:-0.5px; }
  .diff-sub { font-size:10px; letter-spacing:1.5px; color:var(--faint); margin-top:6px; }
  .diff-card:hover .diff-sub { color:rgba(245,245,240,0.55); }
  .diff-arrow { position:absolute; top:14px; right:14px; font-size:15px; color:var(--accent); }
  .resume { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
            width:100%; padding:12px 6px; margin-top:24px; background:transparent; color:var(--ink);
            border:none; transition:background .12s; }
  .resume:hover { background:var(--peer); }
  .resume-l { display:flex; flex-direction:column; align-items:flex-start; gap:5px; }
  .resume-k { font-size:10px; letter-spacing:2.5px; color:var(--accent); font-weight:600; }
  .resume-v { font-family:var(--display); font-weight:800; font-size:19px; letter-spacing:-0.5px; }
  .resume-time { font-family:var(--display); font-weight:800; font-size:19px; font-variant-numeric:tabular-nums; }

  /* ── GAME ───────────────────────────────────────── */
  .game-screen { padding-top:env(safe-area-inset-top); }
  .g-header { padding:14px 20px 0; }
  .g-topbar { display:flex; align-items:center; justify-content:space-between; margin-right:-10px; }
  .back { font-size:11px; letter-spacing:2px; color:var(--faint); font-weight:600; padding:6px 0; }
  .back:hover { color:var(--accent); }
  .g-stats { display:flex; align-items:flex-end; justify-content:space-between;
             padding:6px 0 14px; border-bottom:2px solid var(--ink); margin-top:2px; }
  .stat-k { font-size:10px; letter-spacing:3px; color:var(--faint); }
  .stat-v { font-family:var(--display); font-size:24px; font-weight:800; letter-spacing:-0.5px; color:var(--ink); }
  .stat.right { text-align:right; }
  .timer { font-variant-numeric:tabular-nums; }
  .timer:hover { color:var(--accent); }

  .board-wrap { flex:1 1 auto; display:flex; align-items:center; justify-content:center; padding:18px 20px; }
  .board { position:relative; width:min(100%, 420px, calc(100dvh - 300px)); }
  .board-grid { display:grid; grid-template-columns:repeat(9,1fr); grid-template-rows:repeat(9,1fr);
                aspect-ratio:1/1; border:3px solid var(--box); background:var(--paper); }
  .cell { position:relative; display:flex; align-items:center; justify-content:center;
          background:var(--paper); border-right:1px solid var(--line); border-bottom:1px solid var(--line);
          transition:background .1s; }
  .cell:nth-child(9n) { border-right:none; }
  .cell:nth-child(n+73) { border-bottom:none; }
  .cell.bx-r { border-right:2px solid var(--box); }
  .cell.bx-b { border-bottom:2px solid var(--box); }
  .digit { font-family:var(--mono); font-size:clamp(17px,5.4vw,25px); font-weight:400; color:var(--ink);
           line-height:1; }
  .given .digit { font-weight:700; }
  .notes { display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
           width:100%; height:100%; padding:7%; }
  .notes span { display:flex; align-items:center; justify-content:center; font-family:var(--mono);
                font-size:clamp(7px,2.3vw,11px); color:transparent; line-height:1; }
  .notes span.on { color:var(--note); }
  .cell.peer { background:var(--peer); }
  .cell.same { background:var(--peer); box-shadow:inset 0 0 0 2.5px color-mix(in srgb, var(--accent) 30%, transparent); }
  .cell.conflict { background:var(--conflictbg); }
  .cell.conflict .digit { color:var(--accent); }
  .cell.sel-invert { background:var(--selbg); }
  .cell.sel-invert .digit { color:var(--selink); font-weight:700; }
  .cell.sel-ring { box-shadow:inset 0 0 0 3px var(--accent); z-index:1; }
  .board.paused .digit, .board.paused .notes { filter:blur(6px); opacity:.25; }
  .pause-veil { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
                font-family:var(--display); font-weight:800; font-size:22px; letter-spacing:2px; color:var(--ink); }

  /* ── CONTROLS (Typesetter) ──────────────────────── */
  .controls { flex:0 0 auto; padding:6px 24px calc(env(safe-area-inset-bottom) + 22px); }
  .numpad { display:flex; justify-content:space-between; align-items:center; }
  .num { font-size:clamp(25px,8vw,34px); font-weight:700; color:var(--ink); line-height:1;
         padding:6px 2px; transition:color .1s, transform .06s; }
  .num:active { color:var(--accent); transform:translateY(1px); }
  .num.done { color:var(--line); }
  .menu { display:flex; gap:26px; justify-content:center; margin-top:22px; }
  .menu-item { font-size:12px; letter-spacing:2px; font-weight:600; color:var(--ink);
               padding-bottom:4px; border-bottom:3px solid transparent; }
  .menu-item.active { border-bottom-color:var(--accent); }
  .menu-item .state { color:var(--faint); font-size:11px; }
  .menu-item.active .state { color:var(--accent); }

  /* ── WIN ────────────────────────────────────────── */
  .win { position:absolute; inset:0; background:color-mix(in srgb, var(--bg) 86%, transparent);
         backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:24px; z-index:40; }
  .win-card { width:100%; max-width:340px; background:var(--paper); border:3px solid var(--ink); padding:30px 26px; }
  .win-k { font-size:11px; letter-spacing:4px; color:var(--accent); }
  .win-time { font-family:var(--display); font-weight:800; font-size:54px; letter-spacing:-2px; color:var(--ink);
              font-variant-numeric:tabular-nums; margin:6px 0 2px; }
  .win-sub { font-size:11px; letter-spacing:2px; color:var(--faint); }
  .win-actions { display:flex; flex-direction:column; gap:10px; margin-top:24px; }
  .btn-solid { height:48px; background:var(--ink); color:var(--paper); font-size:12px; letter-spacing:2px; font-weight:600; }
  .btn-line { height:48px; border:2px solid var(--ink); color:var(--ink); font-size:12px; letter-spacing:2px; font-weight:600; }

  /* ── GENERATING ─────────────────────────────────── */
  .generating { position:absolute; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center;
                font-size:13px; letter-spacing:4px; color:var(--ink); z-index:50; }
  .generating .dots { color:var(--accent); animation:blink 1s step-end infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="sudoku.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
